name: check

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.resolution == 'latest' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            resolution: locked
          - python: "3.10"
            resolution: lowest-direct
          - python: "3.11"
            resolution: locked
          - python: "3.12"
            resolution: locked
          - python: "3.13"
            resolution: locked
          - python: "3.14"
            resolution: locked
          - python: "3.14"
            resolution: highest

    defaults:
      run:
        shell: nix develop --command env -u UV_PYTHON -u UV_PYTHON_DOWNLOADS bash -e {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install tools
        run: uv sync --all-groups --python ${{ matrix.python }}

      - name: Apply dependency resolution to runtime dependencies
        if: matrix.resolution != 'locked'
        run: uv pip install --python .venv --reinstall --resolution ${{ matrix.resolution }} -e .

      - name: Run linter
        run: just lint

      - name: Run formatter
        run: just format

      - name: Run tests
        run: just test --cov-branch --cov-report=xml --junitxml=junit.xml

      - name: Run type checking
        run: just typecheck

      - name: Run version check
        run: just versioncheck

      - name: Run license check
        run: just licensecheck

      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
